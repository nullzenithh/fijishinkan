
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIJI 新歓 2026</title>
<meta name="description" content="國學院大學テニス同好会FIJI 2026年度新入生歓迎ページ。活動紹介・入会案内はこちらから。">
<meta name="theme-color" content="#2ecc71">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%232ecc71'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='16' font-family='sans-serif' font-weight='bold'>F</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --g:#2ecc71;--gd:#1aab57;--gl:#d4f5e3;--gp:#f0faf5;
  --y:#f5c842;--yl:#fff8dc;--off:#f7fcf9;
  --txt:#162820;--sub:#2d5a42;--bdr:#bee8d0;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--off);font-family:'Noto Sans JP',sans-serif}
body{animation:pageIn 0.6s ease both;}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important;}
}

#selector{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--off);
  z-index:10;
  transition:opacity 0.5s ease,transform 0.5s ease;
}

.deco-circle{
  position:absolute;border-radius:50%;pointer-events:none;
  animation:drift 20s ease-in-out infinite;
}
.deco-circle.c1{
  width:480px;height:480px;
  top:-100px;right:-80px;
  background:radial-gradient(circle,rgba(46,204,113,0.12) 0%,transparent 70%);
}
.deco-circle.c2{
  width:360px;height:360px;
  bottom:-80px;left:-60px;
  background:radial-gradient(circle,rgba(245,200,66,0.15) 0%,transparent 70%);
  animation-delay:-10s;
}

.logo-area{
  position:relative;z-index:1;text-align:center;margin-bottom:40px;
  animation:fadeUp 0.7s cubic-bezier(.22,.68,0,1.2) both;
}
.logo-badge{
  display:inline-block;
  background:var(--g);
  color:#fff;
  font-family:'Fredoka One',cursive;
  font-size:11px;letter-spacing:0.3em;
  padding:4px 14px;border-radius:20px;
  margin-bottom:14px;
}
.logo-main{
  font-family:'Fredoka One',cursive;
  font-size:clamp(72px,11vw,110px);
  color:var(--txt);letter-spacing:0.04em;line-height:1;
}
.logo-main .letter-i{color:var(--g);animation:shimmer 3s ease-in-out infinite;}
.logo-en{
  font-family:'Noto Sans JP',sans-serif;
  font-size:11px;font-weight:400;letter-spacing:0.25em;
  color:var(--sub);margin-top:6px;
}
.logo-year-tag{
  display:inline-block;
  margin-top:12px;
  background:var(--yl);border:1.5px solid var(--y);
  color:#8a6a00;
  font-family:'Fredoka One',cursive;
  font-size:15px;letter-spacing:0.1em;
  padding:4px 18px;border-radius:8px;
}

.prompt{
  position:relative;z-index:1;
  font-family:'Noto Sans JP',sans-serif;
  font-weight:400;font-size:13px;letter-spacing:0.18em;
  color:var(--sub);margin-bottom:28px;
  animation:fadeUp 0.7s 0.1s cubic-bezier(.22,.68,0,1.2) both;
}
.prompt::before,.prompt::after{
  content:'';display:inline-block;width:24px;height:1px;
  background:var(--bdr);vertical-align:middle;margin:0 10px;
}

.cards{
  position:relative;z-index:1;
  display:flex;gap:20px;
}

.card{
  width:210px;
  background:#fff;
  border:2px solid var(--bdr);
  border-radius:20px;
  display:flex;flex-direction:column;align-items:center;
  padding:32px 24px 28px;gap:0;
  cursor:pointer;
  transition:transform 0.25s cubic-bezier(.22,.68,0,1.2),border-color 0.2s,box-shadow 0.25s;
  position:relative;overflow:hidden;
  will-change:transform,box-shadow;
}
.card:nth-child(1){animation:fadeUp 0.6s 0.15s cubic-bezier(.22,.68,0,1.2) both;}
.card:nth-child(2){animation:fadeUp 0.6s 0.3s cubic-bezier(.22,.68,0,1.2) both;}
.card-accent{
  position:absolute;top:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,var(--gd),var(--g));
  border-radius:0;
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.3s cubic-bezier(.22,.68,0,1.2);
}
.card:hover .card-accent{transform:scaleX(1);}
.card:hover{
  border-color:var(--g);
  transform:translateY(-8px);
  box-shadow:0 20px 48px rgba(46,204,113,0.18),0 4px 16px rgba(0,0,0,0.06);
  background:linear-gradient(180deg,#fff 60%,var(--gp) 100%);
}
.card:focus-visible{
  outline:none;
  border-color:var(--g);
  box-shadow:0 0 0 3px rgba(46,204,113,0.3);
}

.card-icon-wrap{
  width:80px;height:80px;border-radius:50%;
  background:var(--gp);border:2px solid var(--gl);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
  transition:background 0.2s;
}
.card:hover .card-icon-wrap{background:var(--gl);}
.card:hover .card-icon-wrap svg *[stroke]{stroke:var(--gd);}
.card:hover .card-icon-wrap svg *[fill="#d4f5e3"]{fill:var(--g);opacity:0.35;}
.card:active{transform:scale(0.97);transition-duration:0.1s;}
.card-icon-wrap svg{width:40px;height:40px;transition:all 0.2s;}

.card-title{
  font-family:'Fredoka One',cursive;
  font-size:22px;color:var(--txt);letter-spacing:0.04em;
  margin-bottom:6px;
}
.card-desc{
  font-size:11px;font-weight:400;letter-spacing:0.12em;
  color:var(--sub);margin-bottom:18px;
}
.card-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--g);color:#fff;
  font-family:'Fredoka One',cursive;
  font-size:13px;letter-spacing:0.08em;
  padding:8px 20px;border-radius:30px;
  transition:background 0.2s;
}
.card:hover .card-btn{background:var(--gd);}
.card-btn svg{width:12px;height:12px;}

.ball-deco{
  position:absolute;z-index:0;pointer-events:none;
  animation:float 6s ease-in-out infinite;
}
.ball-deco.b1{top:12%;left:8%;animation-delay:0s;}
.ball-deco.b2{top:22%;right:10%;animation-delay:-2s;}
.ball-deco.b3{bottom:15%;left:15%;animation-delay:-4s;}
.ball-deco.b4{bottom:20%;right:8%;animation-delay:-1s;}

#viewer{position:fixed;inset:0;z-index:20;display:none;-webkit-overflow-scrolling:touch;overflow-y:auto;}
#viewer iframe{width:100%;height:100%;border:none;display:block;}
#back-btn{
  position:fixed;top:14px;left:14px;z-index:30;
  background:var(--g);border:none;border-radius:12px;
  padding:10px 22px;
  font-family:'Noto Sans JP',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:0.1em;
  color:#fff;cursor:pointer;
  display:none;transition:all 0.2s;
  box-shadow:0 4px 16px rgba(26,171,87,0.3);
}
#back-btn:hover{background:var(--gd);box-shadow:0 6px 20px rgba(26,171,87,0.4);}

#loading-overlay{
  position:fixed;inset:0;z-index:25;
  background:var(--off);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;
  animation:pageIn 0.3s ease both;
}
.spinner{
  width:44px;height:44px;border-radius:50%;
  border:3px solid var(--gl);border-top-color:var(--g);
  animation:spin 0.75s linear infinite;
}
.loading-text{
  font-family:'Noto Sans JP',sans-serif;
  font-size:12px;font-weight:400;letter-spacing:0.2em;
  color:var(--sub);
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes pageIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:0.7}}
@keyframes shimmer{
  0%,100%{color:var(--g);filter:brightness(1)}
  50%{color:var(--gd);filter:brightness(1.3)}
}
@keyframes drift{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(15px,-10px) scale(1.03)}
  50%{transform:translate(-8px,12px) scale(0.97)}
  75%{transform:translate(10px,8px) scale(1.02)}
}
@keyframes float{
  0%,100%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-12px) rotate(8deg)}
}

@media(max-width:520px){
  #selector{padding:0 24px;}
  .logo-area{margin-bottom:28px;}
  .logo-badge{font-size:9px;padding:3px 10px;margin-bottom:10px;}
  .logo-main{font-size:clamp(56px,16vw,80px);}
  .logo-en{font-size:10px;letter-spacing:0.2em;}
  .logo-year-tag{font-size:12px;padding:3px 14px;margin-top:10px;}
  .prompt{font-size:11px;letter-spacing:0.12em;margin-bottom:20px;}
  .prompt::before,.prompt::after{width:16px;margin:0 8px;}
  .deco-circle.c1{width:280px;height:280px;top:-60px;right:-40px;}
  .deco-circle.c2{width:220px;height:220px;bottom:-50px;left:-40px;}
  .ball-deco{display:none;}
  .cards{flex-direction:column;gap:12px;width:100%;max-width:340px;}
  .card{
    width:100%;
    flex-direction:row;
    padding:18px 20px;
    gap:14px;
    align-items:center;
    border-radius:16px;
  }
  .card-accent{height:100%;width:4px;top:0;left:0;right:auto;bottom:0;
    border-radius:16px 0 0 16px;transform:scaleY(0);transform-origin:top;}
  .card:active .card-accent{transform:scaleY(1);}
  .card-icon-wrap{width:50px;height:50px;flex-shrink:0;margin-bottom:0;border-width:1.5px;}
  .card-icon-wrap svg{width:24px;height:24px;}
  .card-text{flex:1;text-align:left;}
  .card-title{font-size:17px;margin-bottom:1px;}
  .card-desc{font-size:10px;margin-bottom:0;letter-spacing:0.08em;}
  .card-btn{
    padding:0;background:transparent;
    width:32px;height:32px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    border:1.5px solid var(--bdr);
    flex-shrink:0;
    font-size:0;color:transparent;
  }
  .card-btn svg{width:14px;height:14px;}
  .card-btn svg path{stroke:var(--g);}
  .card:active .card-btn{background:var(--g);border-color:var(--g);}
  .card:active .card-btn svg path{stroke:#fff;}
  .recommend-badge{
    font-size:9px;padding:2px 8px;
    border-radius:0 14px 0 8px;
  }
  .recommend-hint{font-size:10px;margin-top:14px;}
  #back-btn{top:10px;left:10px;padding:8px 16px;font-size:12px;border-radius:10px;}
  #loading-overlay{gap:12px;}
  .spinner{width:36px;height:36px;}
}
.recommend-badge{
  position:absolute;top:-1px;right:-1px;
  background:var(--y);color:#6b4f00;
  font-family:'Fredoka One',cursive;
  font-size:10px;font-weight:400;letter-spacing:0.06em;
  padding:3px 12px;border-radius:0 18px 0 10px;
  z-index:2;
}
.recommend-hint{
  position:relative;z-index:1;
  font-family:'Noto Sans JP',sans-serif;
  font-size:11px;font-weight:400;letter-spacing:0.08em;
  color:var(--sub);margin-top:20px;
  opacity:0.85;
  animation:fadeUp 0.7s 0.3s cubic-bezier(.22,.68,0,1.2) both;
}
</style>
</head>

<div id="selector">
  <div class="deco-circle c1"></div>
  <div class="deco-circle c2"></div>

  <svg class="ball-deco b1" width="32" height="32" viewBox="0 0 32 32">
    <circle cx="16" cy="16" r="15" fill="#f0faf5" stroke="#bee8d0" stroke-width="1.5"/>

  <div class="logo-area">

      </div>

        開く

      </div>
    </div>

    <div class="card" onclick="openVersion('iphone')" role="button" tabindex="0" aria-label="iPhone版を開く" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openVersion('iphone')}">

          <circle cx="20" cy="34" r="1.5" fill="#bee8d0"/>
          <rect x="15" y="14" width="10" height="10" rx="2" fill="#d4f5e3"/>
        </svg>
      </div>
      <div class="card-text">
        <div class="card-title">iPhone 版</div>
        <div class="card-desc">スマートフォン表示</div>
      </div>
      <div class="card-btn">
        開く
        <svg viewBox="0 0 12 12" fill="none"><path d="M2 6h8M6 2l4 4-4 4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
  </div>
  <div class="recommend-hint" id="recommend-hint"></div>
</div>

<div id="loading-overlay">
  <div style="font-family:'Fredoka One',cursive;font-size:36px;color:var(--txt);letter-spacing:0.04em;animation:pulse 1.2s ease-in-out infinite;">F<span style="color:var(--g)">I</span>JI</div>
  <div class="spinner"></div>
  <div class="loading-text">読み込み中...</div>
</div>

<div id="viewer">
  <iframe id="content-frame" title="FIJI 新歓 2026"></iframe>
</div>
<button id="back-btn" onclick="goBack()">← 選択画面に戻る</button>

(function(){
  const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const cards=document.querySelectorAll('.card');
  const hint=document.getElementById('recommend-hint');
  if(isMobile){
    const badge=document.createElement('div');
    badge.className='recommend-badge';
    badge.textContent='おすすめ';
    cards[1].appendChild(badge);
    hint.textContent='※ スマートフォンからアクセス中のため、iPhone版がおすすめです';
  }else{
    const badge=document.createElement('div');
    badge.className='recommend-badge';
    badge.textContent='おすすめ';
    cards[0].appendChild(badge);
    hint.textContent='※ PCからアクセス中のため、PC版がおすすめです';
  }
})();

function b64ToBlob(b64){
  const binary=atob(b64);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  return new Blob([bytes],{type:'text/html;charset=utf-8'});
}

let currentUrl=null;

function openVersion(type){
  const sel=document.getElementById('selector');
  const loading=document.getElementById('loading-overlay');
  const viewer=document.getElementById('viewer');
  const frame=document.getElementById('content-frame');
  const backBtn=document.getElementById('back-btn');

  sel.style.opacity='0';sel.style.transform='scale(0.97)';sel.style.pointerEvents='none';
  loading.style.display='flex';

  setTimeout(()=>{
    const b64=type==='pc'?PC_B64:IPHONE_B64;
    const blob=b64ToBlob(b64);
    if(currentUrl)URL.revokeObjectURL(currentUrl);
    currentUrl=URL.createObjectURL(blob);
    frame.src=currentUrl;
    frame.onload=()=>{
      loading.style.display='none';
      viewer.style.opacity='0';
      viewer.style.display='block';
      requestAnimationFrame(()=>{
        viewer.style.transition='opacity 0.4s ease';
        viewer.style.opacity='1';
      });
      backBtn.style.display='block';
    };
  },80);
}

function goBack(){
  const sel=document.getElementById('selector');
  const viewer=document.getElementById('viewer');
  const frame=document.getElementById('content-frame');
  const backBtn=document.getElementById('back-btn');
  viewer.style.transition='opacity 0.35s ease';
  viewer.style.opacity='0';
  backBtn.style.transition='opacity 0.2s ease';
  backBtn.style.opacity='0';
  setTimeout(()=>{
    frame.src='';
    viewer.style.display='none';
    viewer.style.opacity='1';
    viewer.style.transition='';
    backBtn.style.display='none';
    backBtn.style.opacity='1';
    backBtn.style.transition='';
    sel.style.opacity='1';sel.style.transform='scale(1)';sel.style.pointerEvents='auto';
  },350);
}
</script>
