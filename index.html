
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIJI 新歓 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --g:#2ecc71;--gd:#1aab57;--gl:#d4f5e3;--gp:#f0faf5;
  --y:#f5c842;--yl:#fff8dc;--off:#f7fcf9;
  --txt:#162820;--sub:#3d6b52;--bdr:#bee8d0;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--off);font-family:'Noto Sans JP',sans-serif}

#selector{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--off);
  z-index:10;
  transition:opacity 0.5s ease,transform 0.5s ease;
}

.deco-circle{
  position:absolute;border-radius:50%;pointer-events:none;
}
.deco-circle.c1{
  width:480px;height:480px;
  top:-100px;right:-80px;
  background:radial-gradient(circle,rgba(46,204,113,0.12) 0%,transparent 70%);
}
.deco-circle.c2{
  width:360px;height:360px;
  bottom:-80px;left:-60px;
  background:radial-gradient(circle,rgba(245,200,66,0.15) 0%,transparent 70%);
}
.deco-dots{
  position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;
}

.logo-area{
  position:relative;z-index:1;text-align:center;margin-bottom:40px;
  animation:fadeUp 0.7s cubic-bezier(.22,.68,0,1.2) both;
}
.logo-badge{
  display:inline-block;
  background:var(--g);
  color:#fff;
  font-family:'Fredoka One',cursive;
  font-size:11px;letter-spacing:0.3em;
  padding:4px 14px;border-radius:20px;
  margin-bottom:14px;
}
.logo-main{
  font-family:'Fredoka One',cursive;
  font-size:clamp(72px,11vw,110px);
  color:var(--txt);letter-spacing:0.04em;line-height:1;
}
.logo-main .letter-i{color:var(--g);}
.logo-en{
  font-family:'Noto Sans JP',sans-serif;
  font-size:11px;font-weight:400;letter-spacing:0.25em;
  color:var(--sub);margin-top:6px;
}
.logo-year-tag{
  display:inline-block;
  margin-top:12px;
  background:var(--yl);border:1.5px solid var(--y);
  color:#8a6a00;
  font-family:'Fredoka One',cursive;
  font-size:15px;letter-spacing:0.1em;
  padding:4px 18px;border-radius:8px;
}

.prompt{
  position:relative;z-index:1;
  font-family:'Noto Sans JP',sans-serif;
  font-weight:400;font-size:13px;letter-spacing:0.18em;
  color:var(--sub);margin-bottom:28px;
  animation:fadeUp 0.7s 0.1s cubic-bezier(.22,.68,0,1.2) both;
}
.prompt::before,.prompt::after{
  content:'';display:inline-block;width:24px;height:1px;
  background:var(--bdr);vertical-align:middle;margin:0 10px;
}

.cards{
  position:relative;z-index:1;
  display:flex;gap:20px;
  animation:fadeUp 0.7s 0.2s cubic-bezier(.22,.68,0,1.2) both;
}

.card{
  width:210px;
  background:#fff;
  border:2px solid var(--bdr);
  border-radius:20px;
  display:flex;flex-direction:column;align-items:center;
  padding:32px 24px 28px;gap:0;
  cursor:pointer;
  transition:transform 0.25s cubic-bezier(.22,.68,0,1.2),border-color 0.2s,box-shadow 0.25s;
  position:relative;overflow:hidden;
}
.card-accent{
  position:absolute;top:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,var(--gd),var(--g));
  border-radius:0;
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.3s cubic-bezier(.22,.68,0,1.2);
}
.card:hover .card-accent{transform:scaleX(1);}
.card:hover{
  border-color:var(--g);
  transform:translateY(-8px);
  box-shadow:0 20px 48px rgba(46,204,113,0.18),0 4px 16px rgba(0,0,0,0.06);
}

.card-icon-wrap{
  width:80px;height:80px;border-radius:50%;
  background:var(--gp);border:2px solid var(--gl);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
  transition:background 0.2s;
}
.card:hover .card-icon-wrap{background:var(--gl);}
.card-icon-wrap svg{width:40px;height:40px;}

.card-title{
  font-family:'Fredoka One',cursive;
  font-size:22px;color:var(--txt);letter-spacing:0.04em;
  margin-bottom:6px;
}
.card-desc{
  font-size:11px;font-weight:400;letter-spacing:0.12em;
  color:var(--sub);margin-bottom:18px;
}
.card-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--g);color:#fff;
  font-family:'Fredoka One',cursive;
  font-size:13px;letter-spacing:0.08em;
  padding:8px 20px;border-radius:30px;
  transition:background 0.2s;
}
.card:hover .card-btn{background:var(--gd);}
.card-btn svg{width:12px;height:12px;}

.ball-deco{
  position:absolute;z-index:0;pointer-events:none;
  animation:float 6s ease-in-out infinite;
}
.ball-deco.b1{top:12%;left:8%;animation-delay:0s;}
.ball-deco.b2{top:22%;right:10%;animation-delay:-2s;}
.ball-deco.b3{bottom:15%;left:15%;animation-delay:-4s;}
.ball-deco.b4{bottom:20%;right:8%;animation-delay:-1s;}

#viewer{position:fixed;inset:0;z-index:20;display:none;}
#viewer iframe{width:100%;height:100%;border:none;display:block;}
#back-btn{
  position:fixed;top:14px;left:14px;z-index:30;
  background:#fff;border:1.5px solid var(--bdr);border-radius:10px;
  padding:8px 18px;
  font-family:'Noto Sans JP',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:0.1em;
  color:var(--sub);cursor:pointer;
  display:none;transition:all 0.2s;
  box-shadow:0 2px 12px rgba(46,204,113,0.12);
}
#back-btn:hover{border-color:var(--g);color:var(--gd);}

#loading-overlay{
  position:fixed;inset:0;z-index:25;
  background:var(--off);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
.spinner{
  width:44px;height:44px;border-radius:50%;
  border:3px solid var(--gl);border-top-color:var(--g);
  animation:spin 0.75s linear infinite;
}
.loading-text{
  font-family:'Noto Sans JP',sans-serif;
  font-size:12px;font-weight:400;letter-spacing:0.2em;
  color:var(--sub);
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{
  0%,100%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-12px) rotate(8deg)}
}

@media(max-width:520px){
  .cards{flex-direction:column;gap:14px;}
  .card{width:280px;flex-direction:row;padding:20px 24px;gap:16px;align-items:center;}
  .card-icon-wrap{width:56px;height:56px;flex-shrink:0;margin-bottom:0;}
  .card-icon-wrap svg{width:28px;height:28px;}
  .card-text{text-align:left;}
  .card-title{font-size:18px;margin-bottom:2px;}
  .card-desc{margin-bottom:0;}
  .card-btn{display:none;}
}
</style>
</head>

function b64ToBlob(b64){
  const binary=atob(b64);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  return new Blob([bytes],{type:'text/html;charset=utf-8'});
}

let currentUrl=null;

function openVersion(type){
  const sel=document.getElementById('selector');
  const loading=document.getElementById('loading-overlay');
  const viewer=document.getElementById('viewer');
  const frame=document.getElementById('content-frame');
  const backBtn=document.getElementById('back-btn');

  sel.style.opacity='0';sel.style.transform='scale(0.97)';sel.style.pointerEvents='none';
  loading.style.display='flex';

  setTimeout(()=>{
    const b64=type==='pc'?PC_B64:IPHONE_B64;
    const blob=b64ToBlob(b64);
    if(currentUrl)URL.revokeObjectURL(currentUrl);
    currentUrl=URL.createObjectURL(blob);
    frame.src=currentUrl;
    frame.onload=()=>{
      loading.style.display='none';
      viewer.style.display='block';
      backBtn.style.display='block';
    };
  },80);
}

function goBack(){
  const sel=document.getElementById('selector');
  const viewer=document.getElementById('viewer');
  const frame=document.getElementById('content-frame');
  const backBtn=document.getElementById('back-btn');
  frame.src='';
  viewer.style.display='none';
  backBtn.style.display='none';
  sel.style.opacity='1';sel.style.transform='scale(1)';sel.style.pointerEvents='auto';
}
</script>
